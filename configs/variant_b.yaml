variant: nested

nesting:
  mode: prefix          # "prefix" (nested prefixes only) or "arbitrary" (any subset)

switchable_bn:
  enabled: true

distillation:
  enabled: true
  alpha: 1.0            # KL-divergence weight (soft-label signal)
  temperature: 2.0      # softmax temperature (lower = sharper teacher)
  emb_mse_alpha: 1.0    # embedding MSE weight (direct representation match)
