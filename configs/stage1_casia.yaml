_base_: base.yaml

# Stage 1: CASIA-WebFace variant comparison
# ~500k images, ~10.5k identities, 112x112 aligned crops
# Tuned for NVIDIA L4 (24 GB VRAM)

backbone:
  name: resnet50
  pretrained: false
  gradient_checkpointing: true

partitions:
  K: 128
  num_partitions: 3
  dropout:
    distribution: [0.4, 0.3, 0.3, 0.0]

arcface:
  s: 64
  m: 0.5

training:
  epochs: 28
  batch_size: 256           # gradient checkpointing frees ~4x activation memory vs batch_size: 64 previously
  grad_clip: 5.0            # max gradient norm — prevents ArcFace NaN with 10k+ classes
  optimizer:
    type: sgd
    lr: 0.025                # linear scaling: 0.1 * (64/256)
    momentum: 0.9
    weight_decay: 5.0e-4
  scheduler:
    type: cosine
    warmup_epochs: 3         # longer warmup to stabilise with many classes
  val_interval: 4
  checkpoint_interval: 7   # checkpoints at 7, 14, 21, 28

data:
  dataset: casia
  root: data/casia_webface/
  num_workers: 4
  input_size: 112

logging:
  output_dir: runs/
  tensorboard: true
  wandb: false

# Evaluation benchmark (used by scripts/evaluate.py --benchmark lfw)
evaluation:
  lfw:
    root: data/lfw/
    pairs: data/lfw/pairs.txt
